name: Validate

on:
  pull_request:
    branches: [main, dev/*]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  unit-and-component:
    name: Unit + Component Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter=junit --outputFile=test-results.xml
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: test-results.xml

  e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
        shell: pwsh
      - run: npm ci
      # E2E only needs webpack output, not distributable installers.
      # Packaging is validated separately by the release workflow.
      - name: Build app
        run: npx electron-forge package
      - name: Run E2E tests (excluding Annex dual-instance)
        if: runner.os != 'Linux'
        run: npx playwright test --config=playwright.config.ts
        env:
          PLAYWRIGHT_IGNORE_ANNEX: '1'
      - name: Run E2E tests (Linux — requires virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test --config=playwright.config.ts
        env:
          PLAYWRIGHT_IGNORE_ANNEX: '1'
          # chrome-sandbox is not SUID root on GitHub runners
          ELECTRON_DISABLE_SANDBOX: '1'
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-traces-${{ matrix.os }}
          path: test-results/

  e2e-annex:
    name: Annex E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
        shell: pwsh
      - run: npm ci
      - name: Build app
        run: npx electron-forge package
      - name: Run Annex E2E tests
        if: runner.os != 'Linux'
        run: npx playwright test e2e/annex-v2/
      - name: Run Annex E2E tests (Linux — requires virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test e2e/annex-v2/
        env:
          # chrome-sandbox is not SUID root on GitHub runners
          ELECTRON_DISABLE_SANDBOX: '1'
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: annex-traces-${{ matrix.os }}
          path: test-results/

  make-linux:
    name: Linux Package Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm
      - name: Build .deb and .rpm packages
        run: npx electron-forge make
      - name: Verify packages were produced
        run: |
          DEB_COUNT=$(find out/make -name "*.deb" -type f | wc -l)
          RPM_COUNT=$(find out/make -name "*.rpm" -type f | wc -l)
          echo "Found ${DEB_COUNT} .deb and ${RPM_COUNT} .rpm packages"
          if [ "$DEB_COUNT" -eq 0 ] && [ "$RPM_COUNT" -eq 0 ]; then
            echo "::error::No Linux packages were produced"
            exit 1
          fi

  api-surface:
    name: API Surface Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Frozen v0.4 snapshot compile check
      - run: npx tsc --noEmit
      # API version contract tests only
      - run: npx vitest run --project shared -- plugin-api-versions
      # Annotate PR if plugin-types.ts was modified
      - name: Check plugin-types changes
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD | grep -q 'plugin-types.ts'; then
            echo "::warning file=src/shared/plugin-types.ts::plugin-types.ts was modified — verify API backward compatibility"
          fi
